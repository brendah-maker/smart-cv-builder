<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart CV Builder Kenya</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family: 'Segoe UI', sans-serif; }

  @media print {
    body * { visibility: hidden; }
    #cvPreview, #cvPreview * { visibility: visible; }
    #cvPreview { position: absolute; left: 0; top: 0; width: 100%; }
  }
</style>

</head>

<body class="bg-gray-100">

<header class="bg-white shadow p-4 text-center">
  <h1 class="text-2xl font-bold text-blue-600">
    Smart CV Builder for Kenya
  </h1>
  <p class="text-gray-500 text-sm">
    Choose a template. Generate. Download. Done.
  </p>
</header>

<main class="max-w-7xl mx-auto p-6 grid md:grid-cols-2 gap-8">

<!-- ================= FORM ================= -->
<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Enter Your Details</h2>

<div class="space-y-4">

<select id="templateSelect" class="w-full border p-3 rounded-lg">
  <option value="classic">Classic Professional</option>
  <option value="modern">Modern Minimal</option>
  <option value="executive">Two-Column Executive</option>
</select>

<input id="fullName" type="text" placeholder="Full Name"
class="w-full border p-3 rounded-lg">

<textarea id="objective" rows="3"
placeholder="Career Objective"
class="w-full border p-3 rounded-lg"></textarea>

<textarea id="skills" rows="3"
placeholder="Skills (comma separated)"
class="w-full border p-3 rounded-lg"></textarea>

<textarea id="experience" rows="5"
placeholder="Experience (one responsibility per line)"
class="w-full border p-3 rounded-lg"></textarea>

<textarea id="education" rows="3"
placeholder="Education"
class="w-full border p-3 rounded-lg"></textarea>

<textarea id="achievements" rows="4"
placeholder="Achievements (one per line)"
class="w-full border p-3 rounded-lg"></textarea>

<button id="generateBtn"
class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
Generate CV
</button>

<button onclick="window.print()"
class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
Download as PDF
</button>

</div>
</div>

<!-- ================= PREVIEW ================= -->
<div id="cvPreview" class="bg-white p-8 rounded-xl shadow">
<h2 class="text-xl text-gray-400 text-center">
Your CV Preview Appears Here
</h2>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
